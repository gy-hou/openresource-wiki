{% if page.meta.comments == true %}{# 默认关闭，在 frontmatter 中设 comments: true 开启 #}
<h2 id="__comments">{{ lang.t("meta.comments") }}</h2>

<!-- Giscus 评论系统 -->
<!-- 使用前需要：
     1. 在 GitHub 仓库 Settings → Features 中开启 Discussions
     2. 安装 Giscus App: https://github.com/apps/giscus
     3. 去 https://giscus.app/ 填入仓库信息，获取 data-repo-id 和 data-category-id
     4. 将下方占位值替换为真实值
-->
<script
  src="https://giscus.app/client.js"
  data-repo="gy-hou/openresource-wiki"
  data-repo-id="TODO_REPO_ID"
  data-category="Announcements"
  data-category-id="TODO_CATEGORY_ID"
  data-mapping="pathname"
  data-strict="0"
  data-reactions-enabled="1"
  data-emit-metadata="0"
  data-input-position="top"
  data-theme="preferred_color_scheme"
  data-lang="zh-CN"
  data-loading="lazy"
  crossorigin="anonymous"
  async>
</script>

<!-- 跟随 MkDocs Material 主题切换 -->
<script>
  var giscus = document.querySelector("script[src*=giscus]")

  var defined = function () {
    return document.querySelector("[data-md-color-scheme]")
  }

  var observer = new MutationObserver(function() {
    var scheme = document.body.getAttribute("data-md-color-scheme")
    var theme = scheme === "slate" ? "dark" : "light"

    var frame = document.querySelector(".giscus-frame")
    if (frame) {
      frame.contentWindow.postMessage(
        { giscus: { setConfig: { theme: theme } } },
        "https://giscus.app"
      )
    }
  })

  if (defined()) {
    observer.observe(defined(), {
      attributes: true,
      attributeFilter: ["data-md-color-scheme"]
    })
  }
</script>
{% endif %}
